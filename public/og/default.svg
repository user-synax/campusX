<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#6366f110" />
  <circle cx="1100" cy="530" r="250" fill="#8b5cf610" />
  <circle cx="600" cy="315" r="300" fill="#6366f108" />
  
  <!-- Logo text -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="white" text-anchor="middle">
    CampusX
  </text>
  
  <!-- Accent underline -->
  <rect x="450" y="280" width="300" height="6" rx="3" fill="url(#accentGrad)"/>
  
  <!-- Tagline -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#a1a1aa" text-anchor="middle">
    India ka Student Social Network
  </text>
  
  <!-- Subtext -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="300" fill="#71717a" text-anchor="middle">
    Posts · Chats · Notes · Events
  </text>
  
  <!-- Corner decoration -->
  <path d="M 0 80 L 80 80 L 80 0" fill="none" stroke="#6366f1" stroke-width="4"/>
  <path d="M 1200 80 L 1120 80 L 1120 0" fill="none" stroke="#6366f1" stroke-width="4"/>
  <path d="M 0 550 L 80 550 L 80 630" fill="none" stroke="#8b5cf6" stroke-width="4"/>
  <path d="M 1200 550 L 1120 550 L 1120 630" fill="none" stroke="#8b5cf6" stroke-width="4"/>
</svg>
